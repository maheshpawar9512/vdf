<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart Attendance University App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
    rel="stylesheet"
  />
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
  <div id="app" class="flex-grow flex flex-col justify-center items-center p-4 max-w-6xl mx-auto w-full">
    <!-- Login & Signup Container -->
    <section id="auth-section" class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
      <h1 class="text-3xl font-semibold mb-6 text-center text-indigo-700">VDF SCHOOL OF ENGINEERING</h1>

      <!-- Tabs -->
      <div class="flex justify-center mb-6 space-x-8 border-b border-gray-300">
        <button id="login-tab" class="pb-2 border-b-4 border-indigo-600 font-semibold text-indigo-700 focus:outline-none">
          Log In
        </button>
        <button id="signup-tab" class="pb-2 text-gray-600 hover:text-indigo-700 focus:outline-none">
          Sign Up
        </button>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-6">
        <div>
          <label for="login-username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input
            type="text"
            id="login-username"
            name="username"
            required
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            autocomplete="username"
          />
        </div>
        <div>
          <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            type="password"
            id="login-password"
            name="password"
            required
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            autocomplete="current-password"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-indigo-600 text-white font-semibold py-2 rounded-md hover:bg-indigo-700 transition"
        >
          Log In
        </button>
      </form>

      <!-- Signup Form -->
      <form id="signup-form" class="space-y-6 hidden">
        <div>
          <label for="signup-username" class="block text-sm font-medium text-gray-700 mb-1">Username</label>
          <input
            type="text"
            id="signup-username"
            name="username"
            required
            minlength="3"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            autocomplete="username"
            placeholder="Choose a username"
          />
        </div>
        <div>
          <label for="signup-password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            type="password"
            id="signup-password"
            name="password"
            required
            minlength="6"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            autocomplete="new-password"
            placeholder="At least 6 characters"
          />
        </div>
        <div>
          <label for="signup-password-confirm" class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input
            type="password"
            id="signup-password-confirm"
            name="passwordConfirm"
            required
            minlength="6"
            class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
            autocomplete="new-password"
            placeholder="Re-enter your password"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-indigo-600 text-white font-semibold py-2 rounded-md hover:bg-indigo-700 transition"
        >
          Sign Up
        </button>
      </form>
    </section>

    <!-- Main App Section (hidden initially) -->
    <section id="main-app" class="hidden w-full max-w-6xl bg-white rounded-lg shadow-md p-6 flex flex-col space-y-6 mt-6">
      <header class="flex justify-between items-center border-b border-gray-200 pb-4">
        <h2 class="text-2xl font-semibold text-indigo-700">Smart Attendance Dashboard</h2>
        <button id="logout-btn" class="text-red-600 hover:text-red-800 font-semibold">
          <i class="fas fa-sign-out-alt mr-1"></i> Logout
        </button>
      </header>

      <!-- Add Student Form -->
      <section class="bg-gray-50 p-4 rounded-md shadow-inner">
        <h3 class="text-xl font-semibold mb-4 text-indigo-600">Add Student Attendance</h3>
        <form id="student-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label for="rollNo" class="block text-sm font-medium text-gray-700 mb-1">Roll Number</label>
            <input
              type="text"
              id="rollNo"
              name="rollNo"
              required
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="e.g. 2023001"
            />
          </div>
          <div>
            <label for="studentName" class="block text-sm font-medium text-gray-700 mb-1">Student Name</label>
            <input
              type="text"
              id="studentName"
              name="studentName"
              required
              class="w-full border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-indigo-500"
              placeholder="e.g. John Doe"
            />
          </div>
          <div class="md:col-span-2 flex items-center space-x-4 pt-2">
            <label class="inline-flex items-center">
              <input type="checkbox" id="attendancePresent" name="attendancePresent" class="form-checkbox h-5 w-5 text-indigo-600" checked />
              <span class="ml-2 text-gray-700 font-medium">Mark Present</span>
            </label>
            <button
              type="submit"
              class="bg-indigo-600 text-white font-semibold px-6 py-2 rounded-md hover:bg-indigo-700 transition"
            >
              Add Attendance
            </button>
          </div>
        </form>
      </section>

      <!-- Attendance Report -->
      <section class="overflow-x-auto">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-semibold text-indigo-600">Attendance Report</h3>
          <button id="download-attendance-btn" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700 transition flex items-center space-x-2">
            <i class="fas fa-download"></i><span>Download Report</span>
          </button>
        </div>
        <table class="min-w-full border border-gray-300 rounded-md overflow-hidden">
          <thead class="bg-indigo-100 text-indigo-700 font-semibold">
            <tr>
              <th class="px-4 py-2 border-r border-indigo-200 text-left">Roll No</th>
              <th class="px-4 py-2 border-r border-indigo-200 text-left">Name</th>
              <th class="px-4 py-2 border-indigo-200 text-center">Attendance</th>
              <th class="px-4 py-2 text-center">Date &amp; Time</th>
            </tr>
          </thead>
          <tbody id="attendance-tbody" class="bg-white divide-y divide-gray-200"></tbody>
        </table>
      </section>

      <!-- Monthly Attendance Percentage Report -->
      <section class="overflow-x-auto">
        <h3 class="text-xl font-semibold mb-4 text-indigo-600">Monthly Attendance Percentage Report</h3>
        <table class="min-w-full border border-gray-300 rounded-md overflow-hidden">
          <thead class="bg-indigo-100 text-indigo-700 font-semibold">
            <tr>
              <th class="px-4 py-2 border-r border-indigo-200 text-left">Roll No</th>
              <th class="px-4 py-2 border-r border-indigo-200 text-left">Name</th>
              <th class="px-4 py-2 border-r border-indigo-200 text-center">Month</th>
              <th class="px-4 py-2 border-r border-indigo-200 text-center">Attendance %</th>
            </tr>
          </thead>
          <tbody id="monthly-report-tbody" class="bg-white divide-y divide-gray-200"></tbody>
        </table>
      </section>
    </section>
  </div>

  <script>
    // User data stored in localStorage
    let users = JSON.parse(localStorage.getItem("users")) || [];

    // Attendance data stored in localStorage
    let attendanceRecords = JSON.parse(localStorage.getItem("attendanceRecords")) || [];

    const authSection = document.getElementById("auth-section");
    const loginForm = document.getElementById("login-form");
    const signupForm = document.getElementById("signup-form");
    const loginTab = document.getElementById("login-tab");
    const signupTab = document.getElementById("signup-tab");
    const mainAppSection = document.getElementById("main-app");
    const logoutBtn = document.getElementById("logout-btn");
    const studentForm = document.getElementById("student-form");
    const attendanceTbody = document.getElementById("attendance-tbody");
    const monthlyReportTbody = document.getElementById("monthly-report-tbody");
    const downloadAttendanceBtn = document.getElementById("download-attendance-btn");

    // Switch to Login tab
    loginTab.addEventListener("click", () => {
      loginTab.classList.add("border-b-4", "border-indigo-600", "font-semibold", "text-indigo-700");
      signupTab.classList.remove("border-b-4", "border-indigo-600", "font-semibold", "text-indigo-700");
      signupTab.classList.add("text-gray-600");
      loginForm.classList.remove("hidden");
      signupForm.classList.add("hidden");
    });

    // Switch to Signup tab
    signupTab.addEventListener("click", () => {
      signupTab.classList.add("border-b-4", "border-indigo-600", "font-semibold", "text-indigo-700");
      loginTab.classList.remove("border-b-4", "border-indigo-600", "font-semibold", "text-indigo-700");
      loginTab.classList.add("text-gray-600");
      signupForm.classList.remove("hidden");
      loginForm.classList.add("hidden");
    });

    // Helper: Save users to localStorage
    function saveUsers() {
      localStorage.setItem("users", JSON.stringify(users));
    }

    // Helper: Save attendance to localStorage
    function saveAttendance() {
      localStorage.setItem("attendanceRecords", JSON.stringify(attendanceRecords));
    }

    // Render attendance table rows
    function renderAttendance() {
      attendanceTbody.innerHTML = "";
      if (attendanceRecords.length === 0) {
        attendanceTbody.innerHTML = `
          <tr>
            <td colspan="4" class="text-center py-4 text-gray-500">No attendance records found.</td>
          </tr>
        `;
        return;
      }
      attendanceRecords.forEach((record, index) => {
        const tr = document.createElement("tr");
        tr.classList.add(index % 2 === 0 ? "bg-white" : "bg-gray-50");
        tr.innerHTML = `
          <td class="px-4 py-2 border-r border-gray-200">${record.rollNo}</td>
          <td class="px-4 py-2 border-r border-gray-200">${record.studentName}</td>
          <td class="px-4 py-2 border-r border-gray-200 text-center">
            <span class="font-semibold ${
              record.attendance === "Present" ? "text-green-600" : "text-red-600"
            }">${record.attendance}</span>
          </td>
          <td class="px-4 py-2 text-center">${new Date(record.timestamp).toLocaleString()}</td>
        `;
        attendanceTbody.appendChild(tr);
      });
    }

    // Calculate and render monthly attendance percentage report
    function renderMonthlyReport() {
      monthlyReportTbody.innerHTML = "";
      if (attendanceRecords.length === 0) {
        monthlyReportTbody.innerHTML = `
          <tr>
            <td colspan="4" class="text-center py-4 text-gray-500">No attendance records found.</td>
          </tr>
        `;
        return;
      }

      // Group attendance by rollNo, name, and month-year
      const grouped = {};

      attendanceRecords.forEach(record => {
        const date = new Date(record.timestamp);
        const monthYear = date.toLocaleString('default', { month: 'long', year: 'numeric' });
        const key = record.rollNo + '|' + record.studentName + '|' + monthYear;

        if (!grouped[key]) {
          grouped[key] = { rollNo: record.rollNo, studentName: record.studentName, monthYear, presentCount: 0, totalCount: 0 };
        }
        grouped[key].totalCount++;
        if (record.attendance === "Present") {
          grouped[key].presentCount++;
        }
      });

      // Convert grouped object to array and sort by rollNo and monthYear descending
      const groupedArr = Object.values(grouped).sort((a, b) => {
        if (a.rollNo < b.rollNo) return -1;
        if (a.rollNo > b.rollNo) return 1;
        // Sort by monthYear descending (newest first)
        const dateA = new Date(a.monthYear);
        const dateB = new Date(b.monthYear);
        return dateB - dateA;
      });

      groupedArr.forEach((item, index) => {
        const percentage = item.totalCount === 0 ? 0 : ((item.presentCount / item.totalCount) * 100).toFixed(2);
        const tr = document.createElement("tr");
        tr.classList.add(index % 2 === 0 ? "bg-white" : "bg-gray-50");
        tr.innerHTML = `
          <td class="px-4 py-2 border-r border-gray-200">${item.rollNo}</td>
          <td class="px-4 py-2 border-r border-gray-200">${item.studentName}</td>
          <td class="px-4 py-2 border-r border-gray-200 text-center">${item.monthYear}</td>
          <td class="px-4 py-2 text-center font-semibold ${
            percentage >= 75 ? "text-green-600" : "text-red-600"
          }">${percentage}%</td>
        `;
        monthlyReportTbody.appendChild(tr);
      });
    }

    // Simulate sending SMS to parent contact (removed since no parent contact)
    function sendSmsToParent() {
      // No operation since contact details removed
    }

    // Login form submit handler
    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const username = loginForm.username.value.trim();
      const password = loginForm.password.value.trim();

      const user = users.find(u => u.username.toLowerCase() === username.toLowerCase());
      if (!user) {
        alert("User not found. Please sign up first.");
        return;
      }
      if (user.password !== password) {
        alert("Incorrect password.");
        return;
      }

      authSection.classList.add("hidden");
      mainAppSection.classList.remove("hidden");
      renderAttendance();
      renderMonthlyReport();
      loginForm.reset();
    });

    // Signup form submit handler
    signupForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const username = signupForm.username.value.trim();
      const password = signupForm.password.value;
      const passwordConfirm = signupForm.passwordConfirm.value;

      if (username.length < 3) {
        alert("Username must be at least 3 characters.");
        return;
      }
      if (password.length < 6) {
        alert("Password must be at least 6 characters.");
        return;
      }
      if (password !== passwordConfirm) {
        alert("Passwords do not match.");
        return;
      }
      if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
        alert("Username already exists. Please choose another.");
        return;
      }

      users.push({ username, password });
      saveUsers();
      alert("Sign up successful! You can now log in.");
      signupForm.reset();

      // Switch to login tab after signup
      loginTab.click();
    });

    // Logout button handler
    logoutBtn.addEventListener("click", () => {
      mainAppSection.classList.add("hidden");
      authSection.classList.remove("hidden");
    });

    // Student form submit handler
    studentForm.addEventListener("submit", (e) => {
      e.preventDefault();

      const rollNo = studentForm.rollNo.value.trim();
      const studentName = studentForm.studentName.value.trim();
      const attendancePresent = studentForm.attendancePresent.checked;
      const attendance = attendancePresent ? "Present" : "Absent";

      // Add record
      const newRecord = {
        rollNo,
        studentName,
        attendance,
        timestamp: new Date().toISOString(),
      };
      attendanceRecords.unshift(newRecord);
      saveAttendance();
      renderAttendance();
      renderMonthlyReport();

      // No SMS sending since no contact details

      studentForm.reset();
      studentForm.attendancePresent.checked = true;
    });

    // Download attendance report as CSV
    downloadAttendanceBtn.addEventListener("click", () => {
      if (attendanceRecords.length === 0) {
        alert("No attendance records to download.");
        return;
      }

      // CSV header
      const header = [
        "Roll No",
        "Name",
        "Attendance",
        "Date & Time"
      ];

      // Prepare CSV rows
      const rows = attendanceRecords.map(record => [
        `"${record.rollNo}"`,
        `"${record.studentName}"`,
        `"${record.attendance}"`,
        `"${new Date(record.timestamp).toLocaleString()}"`
      ]);

      // Combine header and rows
      const csvContent = [header, ...rows].map(e => e.join(",")).join("\n");

      // Create a blob and download link
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      const now = new Date();
      const dateStr = now.toISOString().slice(0,10);
      a.download = `attendance_report_${dateStr}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
